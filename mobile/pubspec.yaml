name: fund_manager
description: Project Fund Manager - Group-based project finance management app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  dio: ^5.8.0
  pretty_dio_logger: ^1.4.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Real-time
  socket_io_client: ^3.0.1

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.2

  # File handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # UI
  google_fonts: ^6.2.1
  lucide_flutter: ^1.20.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.1
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/.env
